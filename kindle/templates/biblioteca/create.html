{% extends "base.html" %}

{% block title %}
Adicionar à Biblioteca
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card mt-3" style="max-width: 500px;">
        <div class="card-body">
            <h4>{{ livro.titulo }}</h4>
            <p>
                <strong>Autor:</strong>
                {{ livro.autor }}
            </p>
            <p>
                <strong>Gênero:</strong>
                {{ livro.get_genero_display }}
            </p>
            <form method="post">
                {% csrf_token %}
                <button
                    type="submit"
                    class="btn btn-success"
                >
                    Confirmar
                </button>
                <a
                    href="{% url 'acervo' %}"
                    class="btn btn-secondary"
                >
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
