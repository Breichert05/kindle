{% extends "base.html" %}

{% block title %}
Adicionar à Biblioteca
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card mt-3 text-center" style="max-width: 500px;">
        <div class="card-body">
            <h4>{{ livro.titulo }}</h4>
            <p>
                <strong>Autor:</strong>
                {{ livro.autor }}
            </p>
            <p>
                <strong>Gênero:</strong>
                {{ livro.get_genero_display }}
            </p>
            <form method="post">
                {% csrf_token %}
                <input
                    type="hidden"
                    name="next"
                    value="{{ request.GET.next }}"
                >
                <div class="d-flex justify-content-center gap-2">
                    <button
                        type="submit"
                        class="btn btn-success"
                    >
                        Confirmar
                    </button>
                    <a
                        href="{{ request.GET.next|default:'/' }}"
                        class="btn btn-outline-secondary"
                    >
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
