{% extends "base.html" %}
{% block title %}
Remover da Biblioteca
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-body">
            <p>
                Tem certeza que deseja remover este livro da sua biblioteca?
            </p>
            <p>
                <strong>
                    {{ object.livro.titulo }}
                </strong>
            </p>
            <form method="post">
                {% csrf_token %}
                <button
                    type="submit"
                    class="btn btn-danger"
                >
                    Confirmar Remoção
                </button>
                <a
                    href="{% url 'acervo' %}"
                    class="btn btn-secondary"
                >
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
