{% extends "base.html" %}
{% block title %}
Remover da Biblioteca
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-body text-center">
            <p>
                Tem certeza que deseja remover este livro da sua biblioteca?
            </p>
            <p>
                <strong>
                    {{ object.livro.titulo }}
                </strong>
            </p>
            <form method="post">
                {% csrf_token %}
                <input
                    type="hidden"
                    name="next"
                    value="{{ request.GET.next }}"
                >
                <div class="d-flex justify-content-center gap-2">
                    <button
                        type="submit"
                        class="btn btn-danger"
                    >
                        Confirmar Remoção
                    </button>
                    <a
                        href="{{ request.GET.next|default:'/' }}"
                        class="btn btn-outline-secondary"
                    >
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
