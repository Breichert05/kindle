{% extends "base.html" %}
{% block title %}
Nova Coleção
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for campo in form %}
                    <div class="mb-3">
                        {{ campo.label_tag }}
                        {{ campo }}
                        {{ campo.errors }}
                    </div>
                {% endfor %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Salvar</button>
                    <a href="{% url 'colecao_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
