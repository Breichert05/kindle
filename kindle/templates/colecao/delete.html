{% extends "base.html" %}
{% block title %}
Excluir Coleção
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card text-center" style="max-width: 600px;">
        <div class="card-body">
            <h3 class="text-danger">Excluir Coleção</h3>
            <p>Tem certeza que deseja excluir esta coleção?</p>
            <p><strong>{{ object.nome }}</strong></p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <button type="submit" class="btn btn-danger">Confirmar Exclusão</button>
                    <a href="{% url 'colecao_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
