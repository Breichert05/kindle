{% extends "base.html" %}

{% block title %}
    Excluir Nota
{% endblock %}

{% block content %}

<div class="container mt-4">
    <div class="card text-center" style="max-width: 600px;">
        <div class="card-body">
            <p>Tem certeza que deseja excluir esta nota?</p>
            <div class="alert alert-light">
                <strong>{{ object.titulo }}</strong>
                <hr>
                <p class="mb-0">{{ object.conteudo|truncatechars:150 }}</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <button type="submit" class="btn btn-danger">
                        Confirmar Exclusão
                    </button>
                    <a href="{% url 'nota_list' %}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
