{% extends "minimal.html" %}

{% block menu %}
<nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'index' %}">
            Kindle
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'index' %}">
                        <i class="bi bi-house"></i>
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'acervo' %}">
                        <i class="bi bi-book"></i>
                        Acervo
                    </a>
                </li>

                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'biblioteca_list' %}">
                            <i class="bi bi-collection"></i>
                            Minha Biblioteca
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'meta_list' %}">
                            <i class="bi bi-bullseye"></i>
                            Metas
                        </a>
                    </li>
                {% endif %}
            </ul>

            <div class="d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                    <span class="text-light">
                        <i class="bi bi-person-circle"></i>
                        {{ user.username }}
                    </span>

                    <form method="post" action="{% url 'logout' %}" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-right"></i>
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-in-right"></i>
                        Login
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
{% endblock menu %}
